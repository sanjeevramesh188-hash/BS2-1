<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Form</title>

    <link rel="stylesheet" href="rider.css">
</head>

<body>

    <div class="rider-form">
        <h1>Rider</h1>

        <input type="text" placeholder="Enter your name">
        <input type="text" placeholder="Student ID">
        <input type="text" placeholder="Department">
        <input type="text" placeholder="Year of Study">

        <select>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <input type="tel" placeholder="Mobile Number">
    </div>

    <div class="bike-details">
        <h1>Bike Details</h1>

        <input type="text" placeholder="Bike Model">
        <input type="text" placeholder="Bike Registration Number">
        <input type="text" placeholder="Driving License Number">
        <input type="text" placeholder="Insurance Validity Date">
    </div>

    <div class="button-container">
        <button>Submit</button>
    </div>

</body>
</html>
